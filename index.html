<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gayathri & Krishna — Save the Date</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Deepened the gradient for better sparkle contrast */
            background: radial-gradient(circle, #fffdfa 0%, #f1ebe0 100%);
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Particle Layer */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .magazine-wrapper {
            position: relative;
            /* Sizing based on the image aspect ratio */
            width: 90vw;
            max-width: 480px;
            height: 85vh;
            max-height: 680px;
            cursor: pointer;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.15));
            perspective: 2000px;
            z-index: 2;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent; /* Removed white box background */
            border: none; /* Removed golden box completely */
            box-sizing: border-box;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.8s;
            backface-visibility: hidden;
        }

        .page-back { z-index: 1; }
        .page-front { z-index: 2; transform-origin: top center; }

        /* The Roll Animation */
        .magazine-wrapper.is-rolled .page-front {
            transform: rotateX(115deg) translateY(-100%) scaleY(0.4);
            opacity: 0;
            pointer-events: none;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps your image borders and text perfectly visible */
        }

        .hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: #8a7b5d;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="magazine-wrapper" onclick="this.classList.toggle('is-rolled')">
        <div class="page page-back">
            <img src="pages/page2.jpg" alt="Details">
        </div>
        <div class="page page-front">
            <img src="pages/page1.jpg" alt="Cover">
        </div>
        <div class="hint">Tap to Open</div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": ["#D4AF37", "#FFF7E0", "#E3C676"] }, /* Multi-tone gold */
                "shape": { "type": "circle" },
                "opacity": { 
                    "value": 0.8, 
                    "random": true, 
                    "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } 
                },
                "size": { 
                    "value": 4, 
                    "random": true, 
                    "anim": { "enable": true, "speed": 4, "size_min": 0.3, "sync": false } 
                },
                "move": {
                    "enable": true,
                    "speed": 1.5,
                    "direction": "top",
                    "random": true,
                    "straight": false,
                    "out_mode": "out"
                }
            },
            "interactivity": { "detect_on": "canvas", "events": { "onclick": { "enable": false } } },
            "retina_detect": true
        });
    </script>

</body>
</html>
