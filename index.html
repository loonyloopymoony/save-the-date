<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gayathri & Krishna — Wedding Invitation</title>
    <style>
        body {
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column; /* Stack header and card vertically */
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #fffdfa 0%, #f1ebe0 100%);
            overflow: hidden;
            font-family: 'Times New Roman', Times, serif; /* Elegant serif for wedding feel */
            touch-action: none;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Top Heading Style */
        .header-text {
            z-index: 2;
            text-align: center;
            margin-bottom: 20px;
            color: #8a7b5d;
            animation: fadeInDown 1.5s ease-out;
        }

        .header-text h1 {
            font-size: 1.8rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin: 0;
        }

        .header-text p {
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-top: 8px;
            opacity: 0.8;
        }

        .magazine-wrapper {
            position: relative;
            width: 85vw;
            max-width: 480px;
            aspect-ratio: 480 / 680;
            cursor: pointer;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.15));
            perspective: 2000px;
            z-index: 2;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.8s;
            backface-visibility: hidden;
        }

        .page-back { z-index: 1; }
        .page-front { z-index: 2; transform-origin: top center; }

        .magazine-wrapper.is-rolled .page-front {
            transform: rotateX(115deg) translateY(-100%) scaleY(0.4);
            opacity: 0;
            pointer-events: none;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: #8a7b5d;
            font-family: sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 400;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .header-text h1 { font-size: 1.3rem; letter-spacing: 4px; }
            .header-text p { font-size: 0.75rem; }
            .magazine-wrapper { width: 80vw; }
            .hint { bottom: -35px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="header-text">
        <h1>Wedding Invitation</h1>
        <p>Gayathri & Krishna</p>
    </div>

    <div class="magazine-wrapper" id="invite-card">
        <div class="page page-back">
            <img src="pages/page2.jpg" alt="Details">
        </div>
        <div class="page page-front">
            <img src="pages/page1.jpg" alt="Cover">
        </div>
        <div class="hint">Tap to Open</div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const card = document.getElementById('invite-card');
        let hasBurst = false;

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 40, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": ["#D4AF37", "#FFF7E0"] },
                "shape": { "type": "star" },
                "opacity": { "value": 0.6, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1 } },
                "size": { "value": 4, "random": true, "anim": { "enable": true, "speed": 2, "size_min": 0.5 } },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 1, "direction": "top", "random": true, "out_mode": "out" }
            },
            "interactivity": {
                "detect_on": "window",
                "events": { "onhover": { "enable": true, "mode": "bubble" }, "onclick": { "enable": true, "mode": "push" } },
                "modes": { "bubble": { "distance": 100, "size": 8, "duration": 2, "opacity": 1 }, "push": { "particles_nb": 4 } }
            }
        });

        card.addEventListener('click', function() {
            this.classList.toggle('is-rolled');
            if (this.classList.contains('is-rolled') && !hasBurst) {
                window.pJSDom[0].pJS.fn.modes.pushParticles(50);
                hasBurst = true;
            }
        });

        document.addEventListener('mousemove', e => {
            if(Math.random() > 0.8) window.pJSDom[0].pJS.particles.array.push(new window.pJSDom[0].pJS.fn.vendors.createParticle({"x": e.clientX, "y": e.clientY}));
        });

        document.addEventListener('touchmove', e => {
            let touch = e.touches[0];
            if(Math.random() > 0.7) window.pJSDom[0].pJS.particles.array.push(new window.pJSDom[0].pJS.fn.vendors.createParticle({"x": touch.clientX, "y": touch.clientY}));
        });
    </script>

</body>
</html>
