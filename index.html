<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">

<title>Gayathri & Krishna — Save the Date</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Great+Vibes&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#F9F5EF;
font-family:Inter;
overflow-x:hidden;
}

/* INTRO SCREEN */

#intro{

height:100vh;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-align:center;

padding-top:40px;

}

svg{
width:70%;
max-width:620px;
}

/* Kolam draw animation */

.stroke{
stroke:#C79A3B;
stroke-width:4;
fill:none;

stroke-dasharray:800;
stroke-dashoffset:800;

animation:draw 2s ease forwards;
}

.delay1{animation-delay:.3s}
.delay2{animation-delay:1.2s}
.delay3{animation-delay:2.1s}
.delay4{animation-delay:3s}

@keyframes draw{
to{stroke-dashoffset:0}
}

/* Kolam powder particles */

.powder{
position:absolute;
width:6px;
height:6px;
background:#F6E4B3;
border-radius:50%;
opacity:.8;

animation:powderFade 2s forwards;
}

@keyframes powderFade{

0%{
opacity:1;
transform:scale(1);
}

100%{
opacity:0;
transform:scale(.3);
}

}

/* Typography */

.saveDate{
font-family:'Cormorant Garamond';
font-size:34px;
margin-top:20px;

opacity:0;
animation:fade 2s forwards;
animation-delay:3.2s;
}

.names{
font-family:'Great Vibes';
font-size:62px;

margin-top:10px;

opacity:0;
animation:fade 2s forwards;
animation-delay:4.2s;
}

.date{
margin-top:6px;
font-size:20px;

opacity:0;
animation:fade 2s forwards;
animation-delay:5s;
}

button{
margin-top:28px;

padding:12px 36px;

border:none;
border-radius:30px;

background:#C79A3B;
color:white;

font-size:16px;

cursor:pointer;

box-shadow:0 8px 20px rgba(0,0,0,.15);

opacity:0;
animation:fade 2s forwards;
animation-delay:6s;
}

@keyframes fade{
to{opacity:1}
}

/* WEBSITE */

#site{

display:none;

flex-direction:column;

align-items:center;

padding-top:30px;

padding-bottom:60px;

}

/* Poster */

.poster{

width:90vw;
max-width:440px;

box-shadow:0 20px 40px rgba(0,0,0,.2);

border-radius:6px;

overflow:hidden;

}

.poster img{

width:100%;
display:block;

}

/* Directions button */

.directions{

margin-top:26px;

display:flex;
align-items:center;
gap:10px;

background:white;

padding:14px 28px;

border-radius:40px;

font-weight:500;

box-shadow:0 10px 30px rgba(0,0,0,.15);

text-decoration:none;

color:#1f2937;

font-size:18px;

}

.directions:hover{

transform:translateY(-2px);

}

/* lotus particles */

#lotus-container{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

pointer-events:none;

overflow:hidden;

}

.lotus{

position:absolute;

font-size:20px;

opacity:.5;

animation:float 14s linear infinite;

}

@keyframes float{

0%{
transform:translateY(110vh) rotate(0deg);
}

100%{
transform:translateY(-10vh) rotate(360deg);
}

}

</style>

</head>

<body>

<div id="lotus-container"></div>

<!-- INTRO -->

<div id="intro">

<svg id="kolam" viewBox="0 0 600 300">

<path class="stroke delay1"
d="M150 120 Q200 60 250 120 Q200 180 150 120"/>

<path class="stroke delay2"
d="M350 120 Q400 60 450 120 Q400 180 350 120"/>

<path class="stroke delay3"
d="M250 200 Q300 150 350 200 Q300 250 250 200"/>

<path class="stroke delay4"
d="M200 60 Q300 10 400 60"/>

</svg>

<div class="saveDate">Save the Date</div>

<div class="names">Gayathri & Krishna</div>

<div class="date">June 1 • Palakkad</div>

<button onclick="openInvite()">Open Invitation</button>

</div>

<!-- SITE -->

<div id="site">

<div class="poster">

<img src="pages/page2.jpg">

</div>

<a class="directions"
href="https://maps.google.com/?cid=14684307940603514915"
target="_blank">

➡ Directions

</a>

</div>

<script>

/* open invite */

function openInvite(){

document.getElementById("intro").style.display="none"

document.getElementById("site").style.display="flex"

}

/* lotus particles */

function createLotus(){

const lotus=document.createElement("div")

lotus.className="lotus"

lotus.innerHTML="❀"

lotus.style.left=Math.random()*100+"vw"

lotus.style.fontSize=(18+Math.random()*12)+"px"

lotus.style.animationDuration=(12+Math.random()*10)+"s"

document.getElementById("lotus-container").appendChild(lotus)

setTimeout(()=>{

lotus.remove()

},20000)

}

setInterval(createLotus,900)

/* kolam powder effect */

function powderBurst(){

const svg=document.getElementById("kolam")

const rect=svg.getBoundingClientRect()

for(let i=0;i<12;i++){

const dot=document.createElement("div")

dot.className="powder"

dot.style.left=(rect.left+Math.random()*rect.width)+"px"

dot.style.top=(rect.top+Math.random()*rect.height)+"px"

document.body.appendChild(dot)

setTimeout(()=>dot.remove(),2000)

}

}

setInterval(powderBurst,300)

</script>

</body>

</html>
