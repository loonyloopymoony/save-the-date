<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gayathri & Krishna — Save the Date</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            background: radial-gradient(circle, #fffdfa 0%, #f1ebe0 100%);
            overflow: hidden;
            font-family: 'Playfair Display', serif;
            touch-action: none;
            padding-top: 2vh;
            cursor: pointer;
        }

        #particles-js {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        header {
            z-index: 3;
            text-align: center;
            margin-bottom: 15px;
            pointer-events: none;
        }

        header h1 {
            color: #8a7b5d;
            font-size: 1.6rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 300;
            margin: 0;
        }

        .magazine-wrapper {
            position: relative;
            width: 88vw;
            max-width: 440px; 
            aspect-ratio: 480 / 680;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.12));
            perspective: 2000px;
            z-index: 2;
        }

        .page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: transparent;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.8s;
            backface-visibility: hidden;
        }

        .page-back { z-index: 1; }
        .page-front { z-index: 2; transform-origin: top center; }

        body.is-rolled .page-front {
            transform: rotateX(110deg) translateY(-100%) scaleY(0.4);
            opacity: 0;
        }

        img {
            width: 100%; height: 100%;
            object-fit: contain;
        }

        .venue-link {
            position: absolute;
            top: 10%; 
            left: 5%;
            width: 90%;
            height: 40%;
            z-index: 10;
            cursor: pointer;
            background: rgba(255, 255, 255, 0); 
        }

        .hint {
            margin-top: 20px;
            color: #8a7b5d;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            z-index: 3;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            body { padding-top: 4vh; }
            header h1 { font-size: 1.3rem; }
            .magazine-wrapper { width: 82vw; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>

<body onclick="this.classList.toggle('is-rolled')">

    <div id="particles-js"></div>

    <header>
        <h1>Save The Date</h1>
    </header>

    <div class="magazine-wrapper">
        <div class="page page-back">
            <a href="https://maps.google.com/?cid=14684307940603514915&g_mp=CiVnb29nbGUubWFwcy5wbGFjZXMudjEuUGxhY2VzLkdldFBsYWNl" 
               target="_blank" 
               class="venue-link" 
               onclick="event.stopPropagation();">
            </a>
            <img src="pages/page2.jpg" alt="Details">
        </div>

        <div class="page page-front">
            <img src="pages/page1.jpg" alt="Cover">
        </div>
    </div>

    <div class="hint">Tap</div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 55, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": ["#D4AF37", "#FFF7E0"] },
                "shape": { "type": "star" },
                "opacity": { "value": 0.6, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1 } },
                "size": { "value": 4, "random": true, "anim": { "enable": true, "speed": 2, "size_min": 0.5 } },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 1.2, "direction": "top", "random": true, "out_mode": "out" }
            }
        });

        const createStar = (x, y) => {
            if (window.pJSDom && window.pJSDom[0]) {
                window.pJSDom[0].pJS.particles.array.push(
                    new window.pJSDom[0].pJS.fn.vendors.createParticle({ "x": x, "y": y })
                );
            }
        };

        window.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.85) createStar(e.clientX, e.clientY);
        });

        window.addEventListener('touchmove', (e) => {
            let touch = e.touches[0];
            if (Math.random() > 0.75) createStar(touch.clientX, touch.clientY);
        }, { passive: true });
    </script>
</body>
</html>
