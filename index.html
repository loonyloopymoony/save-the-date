<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gayathri & Krishna — Save the Date</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #F6F2EA;
            overflow: hidden; /* Prevents scrollbars during flip */
        }

        /* This container ensures the flip effect stays centered in the viewport */
        #book-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        #book {
            /* Width and height must match the JS config exactly */
            width: 480px; 
            height: 680px;
            filter: drop-shadow(0 40px 80px rgba(0,0,0,0.25));
        }

        .page {
            width: 480px;
            height: 680px;
            background: white;
            border: 6px solid #D4AF37;
            border-radius: 14px;
            box-sizing: border-box; /* Ensures border is included in width */
            padding: 14px;
            /* Remove manual transform-origin, the library handles it */
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Changed to cover for a more seamless look */
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.18);
            border: 1px solid rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

<div id="book-container">
    <div id="book">
        <div class="page" data-density="hard">
            <img src="pages/page1.jpg">
        </div>
        <div class="page" data-density="hard">
            <img src="pages/page2.jpg">
        </div>
    </div>
</div>

<script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>
<script>
    const pageFlip = new St.PageFlip(
        document.getElementById("book"),
        {
            width: 480,
            height: 680,
            size: "fixed",
            // This is the key: Portrait mode only shows one page at a time
            mode: "portrait", 
            // Ensures the 'cover' doesn't offset to the right
            showCover: false, 
            mobileScrollSupport: false,
            clickEventForward: true
        }
    );

    pageFlip.loadFromHTML(document.querySelectorAll(".page"));
</script>

</body>
