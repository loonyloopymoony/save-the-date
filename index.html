<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gayathri & Krishna — Save the Date</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #F6F2EA;
            font-family: sans-serif;
        }

        /* The container that holds the perspective for the 3D flip */
        .card-container {
            width: 480px;
            height: 680px;
            perspective: 1000px;
            cursor: pointer;
        }

        /* The element that actually flips */
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            filter: drop-shadow(0 40px 80px rgba(0,0,0,0.15));
        }

        /* The flip action */
        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* Front and Back common styles */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: white;
            border: 6px solid #D4AF37;
            border-radius: 14px;
            box-sizing: border-box;
            padding: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Back side needs to be rotated 180deg initially */
        .card-back {
            transform: rotateY(180deg);
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .hint {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            color: #8a7b5d;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card-container" onclick="this.classList.toggle('is-flipped')">
        <div class="card-inner">
            <div class="card-front">
                <img src="pages/page1.jpg" alt="Front">
            </div>
            
            <div class="card-back">
                <img src="pages/page2.jpg" alt="Back">
            </div>
        </div>
        <div class="hint">Click to flip</div>
    </div>

</body>
</html>
