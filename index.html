<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gayathri & Krishna — Save the Date</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #F6F2EA;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* The master container - this is what stays centered */
        .magazine-wrapper {
            position: relative;
            width: 480px;
            height: 680px;
            cursor: pointer;
            filter: drop-shadow(0 40px 80px rgba(0,0,0,0.15));
            perspective: 2000px;
        }

        /* Common style for both layers to ensure they stack perfectly */
        .page {
            position: absolute; /* KEY FIX: This stacks the pages on top of each other */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            border: 6px solid #D4AF37;
            border-radius: 14px;
            box-sizing: border-box;
            padding: 14px;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.8s;
            backface-visibility: hidden;
        }

        /* Bottom Layer (Details) */
        .page-back {
            z-index: 1;
        }

        /* Top Layer (Cover) */
        .page-front {
            z-index: 2;
            transform-origin: top center;
        }

        /* The Roll Animation */
        .magazine-wrapper.is-rolled .page-front {
            transform: rotateX(110deg) translateY(-100%) scaleY(0.5);
            opacity: 0;
            pointer-events: none;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps borders and aspect ratio perfect */
            border-radius: 8px;
        }

        .hint {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            color: #8a7b5d;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="magazine-wrapper" onclick="this.classList.toggle('is-rolled')">
        
        <div class="page page-back">
            <img src="pages/page2.jpg" alt="Details">
        </div>

        <div class="page page-front">
            <img src="pages/page1.jpg" alt="Cover">
        </div>

        <div class="hint">Tap to Open</div>
    </div>

</body>
</html>
