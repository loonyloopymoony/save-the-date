<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gayathri & Krishna — Save the Date</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #fffdfa 0%, #f1ebe0 100%);
            overflow: hidden;
            font-family: 'Playfair Display', serif;
            touch-action: none;
        }

        /* Particles Background */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Pulled up Header */
        header {
            z-index: 3;
            text-align: center;
            margin-bottom: 40px; /* Space between header and card */
            margin-top: -20px; /* Pulls header slightly higher */
        }

        header h1 {
            color: #8a7b5d;
            font-size: 1.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 300;
            margin: 0;
        }

        .magazine-wrapper {
            position: relative;
            width: 90vw;
            max-width: 480px;
            height: auto;
            aspect-ratio: 480 / 680;
            cursor: pointer;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.15));
            perspective: 2000px;
            z-index: 2;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.8s;
            backface-visibility: hidden;
        }

        .page-back { z-index: 1; }
        .page-front { z-index: 2; transform-origin: top center; }

        .magazine-wrapper.is-rolled .page-front {
            transform: rotateX(115deg) translateY(-100%) scaleY(0.4);
            opacity: 0;
            pointer-events: none;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: #8a7b5d;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 400;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            header h1 { font-size: 1.4rem; letter-spacing: 4px; }
            .magazine-wrapper { width: 85vw; }
            .hint { bottom: -40px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="particles-js"></div>

    <header>
        <h1>Wedding Invitation</h1>
    </header>

    <div class="magazine-wrapper" onclick="this.classList.toggle('is-rolled')">
        <div class="page page-back">
            <img src="pages/page2.jpg" alt="Details">
        </div>
        <div class="page page-front">
            <img src="pages/page1.jpg" alt="Cover">
        </div>
        <div class="hint">Tap to Open</div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": ["#D4AF37", "#FFF7E0"] },
                "shape": { "type": "star" },
                "opacity": { 
                    "value": 0.7, "random": true, 
                    "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } 
                },
                "size": { 
                    "value": 5, "random": true, 
                    "anim": { "enable": true, "speed": 2, "size_min": 0.5, "sync": false } 
                },
                "line_linked": { "enable": false },
                "move": {
                    "enable": true, "speed": 1.2, "direction": "top", "random": true, "out_mode": "out"
                }
            },
            "retina_detect": true
        });

        // Interactive Sparkle Trail
        document.addEventListener('mousemove', function(e) {
            if(Math.random() > 0.8) {
                window.pJSDom[0].pJS.particles.array.push(
                    new window.pJSDom[0].pJS.fn.vendors.createParticle({ "x": e.clientX, "y": e.clientY })
                );
            }
        });

        document.addEventListener('touchmove', function(e) {
            let touch = e.touches[0];
            if(Math.random() > 0.7) {
                window.pJSDom[0].pJS.particles.array.push(
                    new window.pJSDom[0].pJS.fn.vendors.createParticle({ "x": touch.clientX, "y": touch.clientY })
                );
            }
        });
    </script>

</body>
</html>
