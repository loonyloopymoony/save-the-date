<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">

<title>Gayathri & Krishna — Save the Date</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#F9F5EF;
font-family:Inter;
overflow:hidden;
cursor:pointer;
}

/* ---------- INTRO SCREEN ---------- */

#intro{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

svg{
width:65%;
max-width:620px;
}

/* Kolam draw animation */

.stroke{
stroke:#C79A3B;
stroke-width:4;
fill:none;

stroke-dasharray:800;
stroke-dashoffset:800;

animation:draw 2s ease forwards;
}

.delay1{animation-delay:0.3s}
.delay2{animation-delay:1.2s}
.delay3{animation-delay:2.1s}
.delay4{animation-delay:3s}

@keyframes draw{
to{
stroke-dashoffset:0;
}
}

/* Typography */

.saveDate{
font-family:'Cormorant Garamond';
font-size:34px;
margin-top:20px;
opacity:0;
animation:fade 2s forwards;
animation-delay:3.2s;
}

.names{
font-family:'Great Vibes';
font-size:62px;
margin-top:10px;
opacity:0;
animation:fade 2s forwards;
animation-delay:4.2s;
}

.date{
margin-top:5px;
font-size:20px;
opacity:0;
animation:fade 2s forwards;
animation-delay:5s;
}

button{
margin-top:30px;
padding:12px 34px;
border:none;
border-radius:25px;
background:#C79A3B;
color:white;
font-size:16px;
cursor:pointer;

opacity:0;
animation:fade 2s forwards;
animation-delay:6s;
}

@keyframes fade{
to{opacity:1}
}

/* ---------- LOTUS PARTICLES ---------- */

#lotus-container{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.lotus{
position:absolute;
font-size:22px;
opacity:.6;
animation:float 12s linear infinite;
}

@keyframes float{

0%{
transform:translateY(110vh) rotate(0deg);
}

100%{
transform:translateY(-10vh) rotate(360deg);
}

}

/* ---------- INVITATION ---------- */

#site{
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

/* magazine flip */

.magazine-wrapper{
position:relative;
width:88vw;
max-width:440px;
aspect-ratio:480/680;

filter:drop-shadow(0 20px 50px rgba(0,0,0,0.12));
perspective:2000px;
}

.page{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

transition:transform 1.2s cubic-bezier(.645,.045,.355,1),opacity .8s;

backface-visibility:hidden;
}

.page-back{z-index:1}

.page-front{
z-index:2;
transform-origin:top center;
}

body.is-rolled .page-front{

transform:rotateX(110deg) translateY(-100%) scaleY(.4);

opacity:0;

}

img{
width:100%;
height:100%;
object-fit:contain;
}

.venue-link{
position:absolute;
top:10%;
left:5%;
width:90%;
height:40%;
z-index:10;
}

</style>

</head>


<body onclick="this.classList.toggle('is-rolled')">


<div id="lotus-container"></div>


<!-- INTRO SCREEN -->

<div id="intro">

<svg viewBox="0 0 600 300">

<!-- Kolam loops -->

<path class="stroke delay1"
d="M150 120 Q200 60 250 120 Q200 180 150 120"/>

<path class="stroke delay2"
d="M350 120 Q400 60 450 120 Q400 180 350 120"/>

<path class="stroke delay3"
d="M250 200 Q300 150 350 200 Q300 250 250 200"/>

<path class="stroke delay4"
d="M200 60 Q300 10 400 60"/>

</svg>

<div class="saveDate">Save the Date</div>

<div class="names">Gayathri & Krishna</div>

<div class="date">June 1 • Palakkad</div>

<button onclick="openInvite(event)">Open Invitation</button>

</div>


<!-- WEBSITE -->

<div id="site">

<div class="magazine-wrapper">

<div class="page page-back">

<a href="https://maps.google.com/?cid=14684307940603514915"
target="_blank"
class="venue-link"
onclick="event.stopPropagation();"></a>

<img src="pages/page2.jpg">

</div>

<div class="page page-front">

<img src="pages/page1.jpg">

</div>

</div>

</div>



<script>

/* open invite */

function openInvite(e){

e.stopPropagation()

document.getElementById("intro").style.display="none"

document.getElementById("site").style.display="flex"

}


/* lotus particles */

function createLotus(){

const lotus=document.createElement("div")

lotus.className="lotus"

lotus.innerHTML="❀"

lotus.style.left=Math.random()*100+"vw"

lotus.style.fontSize=(18+Math.random()*12)+"px"

lotus.style.animationDuration=(10+Math.random()*10)+"s"

document.getElementById("lotus-container").appendChild(lotus)

setTimeout(()=>{

lotus.remove()

},20000)

}

setInterval(createLotus,800)

</script>

</body>

</html>
