<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gayathri & Krishna — Save the Date</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #F6F2EA;
            overflow: hidden;
        }

        /* The container that holds both pages stacked */
        .magazine-cover {
            position: relative;
            width: 480px;
            height: 680px;
            cursor: pointer;
            filter: drop-shadow(0 40px 80px rgba(0,0,0,0.15));
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            border: 6px solid #D4AF37;
            border-radius: 14px;
            box-sizing: border-box;
            padding: 14px;
            transition: all 0.9s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Bottom Page (Details) - Stays still */
        .page-bottom {
            z-index: 1;
        }

        /* Top Page (Cover) - Slides and fades */
        .page-top {
            z-index: 2;
        }

        /* The Reveal Animation */
        .magazine-cover.is-revealed .page-top {
            transform: translateY(-100%) scale(0.95); /* Slides up and shrinks slightly */
            opacity: 0;
            pointer-events: none; /* Allows clicking the bottom page if needed */
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .hint {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            color: #8a7b5d;
            font-family: sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="magazine-cover" onclick="this.classList.toggle('is-revealed')">
        
        <div class="page page-bottom">
            <img src="pages/page2.jpg" alt="Details">
        </div>

        <div class="page page-top">
            <img src="pages/page1.jpg" alt="Cover">
        </div>

        <div class="hint">Tap to Open</div>
    </div>

</body>
</html>
