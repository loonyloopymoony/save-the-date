<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Save the Date</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#fdf6f0;
font-family:'Cinzel',serif;
overflow-x:hidden;
text-align:center;
color:#5a3e36;
}

#intro{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

.kolam-text{
width:320px;
margin-bottom:20px;
}

.kolam-text path{
stroke:#8b5e3c;
stroke-width:2;
fill:none;
stroke-dasharray:1000;
stroke-dashoffset:1000;
animation:draw 4s forwards;
}

@keyframes draw{
to{stroke-dashoffset:0;}
}

.fade-text{
opacity:0;
animation:fadeUp 2s forwards;
animation-delay:4s;
max-width:600px;
}

.names{
font-family:'Great Vibes',cursive;
font-size:48px;
margin-top:20px;
opacity:0;
animation:fadeUp 2s forwards;
animation-delay:6s;
}

.details{
margin-top:10px;
opacity:0;
animation:fadeUp 2s forwards;
animation-delay:7s;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.open-btn{
margin-top:40px;
padding:12px 32px;
border:none;
background:#c89b6d;
color:white;
font-size:18px;
cursor:pointer;
border-radius:30px;
opacity:0;
animation:fadeUp 2s forwards;
animation-delay:8s;
}

#invite{
display:none;
padding-top:30px;
}

.header{
font-family:'Great Vibes',cursive;
font-size:36px;
margin-bottom:10px;
}

.image-container{
position:relative;
width:90%;
max-width:420px;
margin:auto;
perspective:1000px;
}

.card{
width:100%;
transition:transform 0.8s;
transform-style:preserve-3d;
}

.card.flipped{
transform:rotateY(180deg);
}

.card-face{
position:absolute;
width:100%;
backface-visibility:hidden;
}

.card-face img{
width:100%;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card-back{
transform:rotateY(180deg);
}

.directions{
margin-top:20px;
padding:10px 28px;
background:#8b5e3c;
color:white;
border:none;
border-radius:25px;
cursor:pointer;
}

.petal{
position:fixed;
top:-20px;
width:12px;
height:12px;
background:#f2b5a7;
border-radius:50%;
opacity:0.7;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

</style>
</head>

<body>

<div id="intro">

<svg class="kolam-text" viewBox="0 0 500 100">
<path d="M10 60 Q100 10 200 60 T390 60"/>
<path d="M50 80 Q140 30 240 80 T430 80"/>
</svg>

<div class="fade-text">
By the divine grace of the Almighty and with the blessings of our elders,
we cordially invite you to the auspicious wedding ceremony of
</div>

<div class="names">
Gayathri & Krishna
</div>

<div class="details">
June 6 & 7 • Palakkad
</div>

<button class="open-btn" onclick="openInvite()">Open</button>

</div>

<div id="invite">

<div class="header">
Save the Date • Gayathri & Krishna
</div>

<div class="image-container" onclick="flipCard()">

<div class="card" id="card">

<div class="card-face">
<img src="page1.jpg">
</div>

<div class="card-face card-back">
<img src="page2.jpg">
</div>

</div>

</div>

<button class="directions">
Directions
</button>

</div>

<script>

function openInvite(){
document.getElementById("intro").style.display="none"
document.getElementById("invite").style.display="block"
}

function flipCard(){
document.getElementById("card").classList.toggle("flipped")
}

function createPetal(){

const petal=document.createElement("div")
petal.className="petal"

petal.style.left=Math.random()*100+"vw"
petal.style.animationDuration=(5+Math.random()*5)+"s"

document.body.appendChild(petal)

setTimeout(()=>petal.remove(),10000)

}

setInterval(createPetal,500)

</script>

</body>
</html>
