<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gayathri & Krishna — Save the Date</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  /* wedding paper tone */
  background:#F6F2EA;
}

#book{
  width:960px;
  height:680px;
  margin:auto;
  filter: drop-shadow(0 40px 80px rgba(0,0,0,0.25));
}
  
.page{
  width:480px;
  height:680px;

  background:white;

  /* wedding invitation border */
  border:6px solid #D4AF37;

  border-radius:14px;

  box-shadow:
  0 25px 60px rgba(0,0,0,0.18),
  0 8px 20px rgba(0,0,0,0.12);
}

.page{
  padding:14px;
}
  
.page img{
width:100%;
height:100%;
object-fit: contain;
border-radius:10px;

/* realistic card shadow */
box-shadow:
0 15px 35px rgba(0,0,0,0.18),
0 5px 10px rgba(0,0,0,0.12);

/* subtle paper edge */
border:1px solid rgba(0,0,0,0.08);
}

</style>

</head>

<body>

<div id="book">

<div class="page">
<img src="pages/page1.jpg">
</div>

<div class="page">
<img src="pages/page2.jpg">
</div>

</div>

<script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>

<script>

const pageFlip = new St.PageFlip(
document.getElementById("book"),
{
width:480,
height:680,
showCover:true,
mobileScrollSupport:false
}
);

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

</script>

</body>

</html>
