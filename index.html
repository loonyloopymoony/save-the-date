<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gayathri & Krishna — Save the Date</title>

<style>

body{
margin:0;
background:#FBF7F2;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* gives depth to flip animation */
perspective:2000px;
}

#book{
width:480px;
height:680px;
margin:auto;
position:relative;
}

.page img{
width:100%;
height:100%;
object-fit:cover;
border-radius:10px;

/* realistic card shadow */
box-shadow:
0 15px 35px rgba(0,0,0,0.18),
0 5px 10px rgba(0,0,0,0.12);

/* subtle paper edge */
border:1px solid rgba(0,0,0,0.08);
}

</style>

</head>

<body>

<div id="book">

<div class="page">
<img src="pages/page1.jpg">
</div>

<div class="page">
<img src="pages/page2.jpg">
</div>

</div>

<script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>

<script>

const pageFlip = new St.PageFlip(
document.getElementById("book"),
{
width:480,
height:680,
showCover:true,
mobileScrollSupport:false
}
);

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

</script>

</body>

</html>
