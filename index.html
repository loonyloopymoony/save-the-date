<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gayathri & Krishna — Save the Date</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#F8F3E8 0%,#EDE2CF 100%);
font-family:'Cormorant Garamond',serif;
overflow:hidden;
cursor:pointer;
}

header{
text-align:center;
margin-bottom:20px;
z-index:3;
}

header h1{
font-family:'Playfair Display',serif;
letter-spacing:4px;
font-size:1.7rem;
color:#7A6A4F;
margin:0;
}

header p{
margin:6px 0 0 0;
letter-spacing:2px;
font-size:.9rem;
color:#8D7B5A;
}

#lotus-container{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
overflow:hidden;
}

.lotus{
position:absolute;
font-size:20px;
opacity:.7;
animation:float 12s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) rotate(0deg)}
100%{transform:translateY(-10vh) rotate(360deg)}
}

.magazine-wrapper{
position:relative;
width:88vw;
max-width:440px;
aspect-ratio:480/680;
filter:drop-shadow(0 20px 50px rgba(0,0,0,0.12));
perspective:2000px;
z-index:2;
display:none;
}

.page{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:transparent;
transition:transform 1.2s cubic-bezier(.645,.045,.355,1),opacity .8s;
backface-visibility:hidden;
}

.page-back{z-index:1;}

.page-front{
z-index:2;
transform-origin:top center;
}

body.is-rolled .page-front{
transform:rotateX(110deg) translateY(-100%) scaleY(.4);
opacity:0;
}

img{
width:100%;
height:100%;
object-fit:contain;
}

.venue-link{
position:absolute;
top:10%;
left:5%;
width:90%;
height:40%;
z-index:10;
cursor:pointer;
}

#kolamIntro{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle,#F8F3E8 0%,#EDE2CF 100%);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:5;
}

#kolamCanvas{
width:280px;
height:280px;
}

#introText{
margin-top:20px;
font-family:'Playfair Display',serif;
letter-spacing:3px;
font-size:1.3rem;
color:#7A6A4F;
opacity:0;
transition:opacity 1s;
text-align:center;
}

</style>
</head>

<body onclick="this.classList.toggle('is-rolled')">

<div id="lotus-container"></div>

<div id="kolamIntro">

<canvas id="kolamCanvas" width="300" height="300"></canvas>

<div id="introText">
Save the Date<br>
Gayathri & Krishna
</div>

</div>

<header>
<h1>Gayathri & Krishna</h1>
<p>Save the Date · June 2026 · Palakkad</p>
</header>

<div class="magazine-wrapper">

<div class="page page-back">

<a href="https://maps.google.com/?cid=14684307940603514915"
target="_blank"
class="venue-link"
onclick="event.stopPropagation();"></a>

<img src="pages/page2.jpg">

</div>

<div class="page page-front">
<img src="pages/page1.jpg">
</div>

</div>

<script>

const canvas=document.getElementById("kolamCanvas");
const ctx=canvas.getContext("2d");

ctx.strokeStyle="#C7A75B";
ctx.lineWidth=2;

let step=0;

function drawKolam(){

ctx.beginPath();

let r=100;
let cx=150;
let cy=150;

for(let i=0;i<step;i++){

let angle=i*0.1;

let x=cx+r*Math.cos(angle)*Math.sin(angle);
let y=cy+r*Math.sin(angle)*Math.cos(angle);

ctx.lineTo(x,y);

}

ctx.stroke();

step+=3;

if(step<250){

requestAnimationFrame(drawKolam);

}else{

document.getElementById("introText").style.opacity=1;

setTimeout(()=>{

document.getElementById("kolamIntro").style.display="none";
document.querySelector(".magazine-wrapper").style.display="block";

},2000)

}

}

drawKolam();


function createLotus(){

const lotus=document.createElement("div");

lotus.className="lotus";
lotus.innerHTML="❀";

lotus.style.left=Math.random()*100+"vw";
lotus.style.fontSize=(18+Math.random()*12)+"px";
lotus.style.animationDuration=(10+Math.random()*10)+"s";

document.getElementById("lotus-container").appendChild(lotus);

setTimeout(()=>{

lotus.remove();

},20000)

}

setInterval(createLotus,700);

</script>

</body>
</html>
